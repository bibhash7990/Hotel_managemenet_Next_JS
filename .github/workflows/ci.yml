name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hotel
          POSTGRES_PASSWORD: hotel
          POSTGRES_DB: hotel_booking
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hotel -d hotel_booking"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://hotel:hotel@localhost:5432/hotel_booking
      MONGODB_URI: mongodb://127.0.0.1:27017/hotel_booking_test
      JWT_ACCESS_SECRET: ci-access-secret-must-be-at-least-32-chars
      JWT_REFRESH_SECRET: ci-refresh-secret-must-be-at-least-32-chars
      WEB_ORIGIN: http://localhost:3000
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm install
      - run: npx prisma generate --schema apps/api/prisma/schema.prisma
      - run: npx prisma migrate deploy --schema apps/api/prisma/schema.prisma
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
